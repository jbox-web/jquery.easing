---
name: CI

permissions: {}

on:
  push:
    branches:
      - '**'
  pull_request:
    branches:
      - '**'
  schedule:
    - cron: '0 4 1 * *'
  # Run workflow manually
  workflow_dispatch:

jobs:
  gulp:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          persist-credentials: false

      - name: Setup mise
        uses: jdx/mise-action@v3

      - name: Install NodeJS dependencies
        run: mise deps

      - name: Run Gulp
        run: mise build
